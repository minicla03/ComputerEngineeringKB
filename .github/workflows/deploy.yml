name: Deploy KB Site (Zensical)
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Zensical
        run: pip install zensical

      - name: Build Site
        run: zensical build # Crea la cartella 'site' con tutto il contenuto

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site # Carica la cartella generata

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
