project:
  name: Computer Engineering KB
  url: https://minicla03.github.io/ComputerEngineeringKB/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.tabs
    - content.code.copy
    - content.math.katex # Supporto nativo per la matematica (più veloce di MathJax)
    - content.diagrams.mermaid # Supporto nativo per Mermaid

content:
  admonitions: true
  arithmatex: true
  typography: true

# Zensical gestisce le esclusioni in modo più intuitivo
build:
  exclude:
    - "*.py"
    - "requirements.txt"
    - ".vscode/"
